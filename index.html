<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase - Product Catalog</title>
<style>
  :root {
    --primary: #2563eb;
    --dark: #1e293b;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --border: #e2e8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ---------- Navbar (shared across all routes) ---------- */
  header {
    background: var(--dark);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 20px; font-weight: bold; cursor: pointer; }
  .logo span { color: #60a5fa; }
  nav { display: flex; gap: 18px; align-items: center; }
  nav a {
    color: #cbd5e1;
    text-decoration: none;
    cursor: pointer;
    font-size: 14px;
  }
  nav a.active, nav a:hover { color: #fff; }
  #cartBadge {
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    padding: 2px 8px;
    font-size: 12px;
    margin-left: 4px;
  }

  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* ---------- Home / Catalog view ---------- */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .search-bar input, .search-bar select {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
  }
  .search-bar input { flex: 1; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #eee;
    display: block;
  }
  .card-body { padding: 12px; }
  .card-body .cat { font-size: 11px; color: var(--primary); text-transform: uppercase; font-weight: bold; }
  .card-body h3 { font-size: 14px; margin: 6px 0; min-height: 38px; }
  .card-body .price { font-weight: bold; color: var(--dark); font-size: 16px; }
  .card-body button {
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  .card-body button:hover { background: #1d4ed8; }

  /* ---------- Product Detail view ---------- */
  .detail {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 24px;
    border: 1px solid var(--border);
  }
  .detail img { width: 100%; border-radius: 12px; object-fit: cover; }
  .detail h2 { margin-bottom: 8px; }
  .detail .price { font-size: 26px; color: var(--primary); font-weight: bold; margin: 10px 0; }
  .detail .desc { color: #555; line-height: 1.5; margin-bottom: 16px; }
  .detail .qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .detail .qty-row button {
    width: 32px; height: 32px; border: 1px solid var(--border);
    background: #fff; border-radius: 6px; cursor: pointer; font-size: 16px;
  }
  .back-link { display: inline-block; margin-bottom: 16px; color: var(--primary); cursor: pointer; font-size: 14px; }
  .add-btn {
    padding: 12px 22px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
  }

  /* ---------- Cart view ---------- */
  .cart-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
  .cart-item .info { flex: 1; }
  .cart-item .info h4 { font-size: 14px; }
  .cart-item .info .price { color: var(--primary); font-weight: bold; }
  .cart-item .remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 13px; }
  .cart-total {
    text-align: right;
    font-size: 20px;
    font-weight: bold;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2px solid var(--border);
  }
  .empty-state { text-align: center; padding: 60px 20px; color: #888; }

  /* ---------- Utility ---------- */
  .loader {
    border: 4px solid #e0e0e0;
    border-top: 4px solid var(--primary);
    border-radius: 50%;
    width: 32px; height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 50px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--dark);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity .3s;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .detail { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="navigateTo('/')">Shop<span>Ease</span></div>
  <nav>
    <a onclick="navigateTo('/')" id="navHome">Home</a>
    <a onclick="navigateTo('/cart')" id="navCart">Cart<span id="cartBadge">0</span></a>
  </nav>
</header>

<main id="app"></main>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   MODULE 1: DATA STORE
   In a real deployment this would call a backend API.
   Kept as a static module here so the app needs zero
   external dependencies / API keys to run anywhere.
========================================================= */
const ProductStore = (() => {
  const products = [
    { id: 1, name: "Wireless Headphones", category: "Electronics", price: 2499, img: "https://picsum.photos/seed/p1/400/300", desc: "Over-ear wireless headphones with noise cancellation and 30hr battery life." },
    { id: 2, name: "Smart Watch", category: "Electronics", price: 4999, img: "https://picsum.photos/seed/p2/400/300", desc: "Fitness tracking smart watch with heart-rate monitor and AMOLED display." },
    { id: 3, name: "Running Shoes", category: "Footwear", price: 1899, img: "https://picsum.photos/seed/p3/400/300", desc: "Lightweight breathable running shoes with cushioned sole." },
    { id: 4, name: "Leather Backpack", category: "Bags", price: 1599, img: "https://picsum.photos/seed/p4/400/300", desc: "Premium leather backpack with laptop compartment, fits up to 15.6 inches." },
    { id: 5, name: "Bluetooth Speaker", category: "Electronics", price: 1299, img: "https://picsum.photos/seed/p5/400/300", desc: "Portable waterproof speaker with deep bass and 12hr playback." },
    { id: 6, name: "Cotton T-Shirt", category: "Clothing", price: 499, img: "https://picsum.photos/seed/p6/400/300", desc: "100% cotton, breathable everyday t-shirt available in multiple colors." },
    { id: 7, name: "Office Chair", category: "Furniture", price: 5999, img: "https://picsum.photos/seed/p7/400/300", desc: "Ergonomic office chair with lumbar support and adjustable height." },
    { id: 8, name: "Coffee Maker", category: "Home", price: 2299, img: "https://picsum.photos/seed/p8/400/300", desc: "Automatic drip coffee maker with built-in grinder, 6-cup capacity." },
    { id: 9, name: "Yoga Mat", category: "Fitness", price: 699, img: "https://picsum.photos/seed/p9/400/300", desc: "Non-slip eco-friendly yoga mat, 6mm thick for extra comfort." },
    { id: 10, name: "Desk Lamp", category: "Home", price: 899, img: "https://picsum.photos/seed/p10/400/300", desc: "LED desk lamp with 3 brightness modes and USB charging port." },
    { id: 11, name: "Sunglasses", category: "Accessories", price: 1199, img: "https://picsum.photos/seed/p11/400/300", desc: "UV-protection polarized sunglasses with lightweight frame." },
    { id: 12, name: "Gaming Mouse", category: "Electronics", price: 1499, img: "https://picsum.photos/seed/p12/400/300", desc: "RGB gaming mouse with 6 programmable buttons and high DPI sensor." },
  ];

  // simulate async fetch (mirrors a real REST API call pattern)
  const getAll = () => new Promise(resolve => setTimeout(() => resolve(products), 250));
  const getById = (id) => new Promise(resolve =>
    setTimeout(() => resolve(products.find(p => p.id === Number(id))), 150)
  );
  const getCategories = () => [...new Set(products.map(p => p.category))];

  return { getAll, getById, getCategories };
})();

/* =========================================================
   MODULE 2: CART (state management)
========================================================= */
const Cart = (() => {
  let items = JSON.parse(sessionStorage.getItem('cart') || '[]');

  const save = () => sessionStorage.setItem('cart', JSON.stringify(items));

  const add = (product, qty = 1) => {
    const existing = items.find(i => i.id === product.id);
    if (existing) existing.qty += qty;
    else items.push({ ...product, qty });
    save();
    updateBadge();
    showToast(`${product.name} added to cart`);
  };

  const remove = (id) => {
    items = items.filter(i => i.id !== id);
    save();
    updateBadge();
    render(); // re-render cart view if open
  };

  const getAll = () => items;
  const getCount = () => items.reduce((sum, i) => sum + i.qty, 0);
  const getTotal = () => items.reduce((sum, i) => sum + i.qty * i.price, 0);
  const updateBadge = () => {
    document.getElementById('cartBadge').textContent = getCount();
  };

  return { add, remove, getAll, getCount, getTotal, updateBadge };
})();

/* =========================================================
   MODULE 3: ROUTER (client-side routing, no page reload)
   Routes: '/'  -> catalog
           '/product/:id' -> detail page
           '/cart' -> cart page
========================================================= */
function navigateTo(path) {
  window.location.hash = path;
}

function parseRoute() {
  const hash = window.location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { name: 'home' };
  if (parts[0] === 'product' && parts[1]) return { name: 'product', id: parts[1] };
  if (parts[0] === 'cart') return { name: 'cart' };
  return { name: 'home' };
}

function setActiveNav(routeName) {
  document.getElementById('navHome').classList.toggle('active', routeName === 'home' || routeName === 'product');
  document.getElementById('navCart').classList.toggle('active', routeName === 'cart');
}

/* =========================================================
   MODULE 4: VIEWS (render functions per route)
========================================================= */
const app = document.getElementById('app');
let currentSearch = '';
let currentCategory = '';

async function viewHome() {
  app.innerHTML = `<div class="loader"></div>`;
  const products = await ProductStore.getAll();
  const categories = ProductStore.getCategories();

  app.innerHTML = `
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search products..." value="${currentSearch}">
      <select id="categorySelect">
        <option value="">All Categories</option>
        ${categories.map(c => `<option value="${c}" ${c === currentCategory ? 'selected' : ''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="grid" id="productGrid"></div>
  `;

  renderGrid(products);

  document.getElementById('searchInput').addEventListener('input', debounce((e) => {
    currentSearch = e.target.value;
    filterAndRender(products);
  }, 250));

  document.getElementById('categorySelect').addEventListener('change', (e) => {
    currentCategory = e.target.value;
    filterAndRender(products);
  });
}

function filterAndRender(products) {
  const filtered = products.filter(p => {
    const matchesSearch = p.name.toLowerCase().includes(currentSearch.toLowerCase());
    const matchesCategory = currentCategory ? p.category === currentCategory : true;
    return matchesSearch && matchesCategory;
  });
  renderGrid(filtered);
}

function renderGrid(products) {
  const grid = document.getElementById('productGrid');
  if (products.length === 0) {
    grid.innerHTML = `<div class="empty-state">No products found.</div>`;
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="card" onclick="navigateTo('/product/${p.id}')">
      <img src="${p.img}" alt="${p.name}" loading="lazy">
      <div class="card-body">
        <div class="cat">${p.category}</div>
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button onclick="event.stopPropagation(); Cart.add(${JSON.stringify(p).replace(/"/g, '&quot;')})">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

async function viewProduct(id) {
  app.innerHTML = `<div class="loader"></div>`;
  const product = await ProductStore.getById(id);

  if (!product) {
    app.innerHTML = `<div class="empty-state">Product not found.<br><a class="back-link" onclick="navigateTo('/')">← Back to catalog</a></div>`;
    return;
  }

  app.innerHTML = `
    <a class="back-link" onclick="navigateTo('/')">← Back to catalog</a>
    <div class="detail">
      <img src="${product.img}" alt="${product.name}">
      <div>
        <div class="cat" style="color:var(--primary);font-weight:bold;font-size:12px;">${product.category.toUpperCase()}</div>
        <h2>${product.name}</h2>
        <div class="price">₹${product.price}</div>
        <p class="desc">${product.desc}</p>
        <div class="qty-row">
          <button id="qtyMinus">−</button>
          <span id="qtyValue">1</span>
          <button id="qtyPlus">+</button>
        </div>
        <button class="add-btn" id="addBtn">Add to Cart</button>
      </div>
    </div>
  `;

  let qty = 1;
  document.getElementById('qtyMinus').onclick = () => {
    if (qty > 1) qty--;
    document.getElementById('qtyValue').textContent = qty;
  };
  document.getElementById('qtyPlus').onclick = () => {
    qty++;
    document.getElementById('qtyValue').textContent = qty;
  };
  document.getElementById('addBtn').onclick = () => Cart.add(product, qty);
}

function viewCart() {
  const items = Cart.getAll();

  if (items.length === 0) {
    app.innerHTML = `
      <div class="empty-state">
        Your cart is empty.<br>
        <a class="back-link" onclick="navigateTo('/')">← Browse products</a>
      </div>`;
    return;
  }

  app.innerHTML = `
    <h2 style="margin-bottom:16px;">Your Cart</h2>
    ${items.map(i => `
      <div class="cart-item">
        <img src="${i.img}" alt="${i.name}" loading="lazy">
        <div class="info">
          <h4>${i.name}</h4>
          <div class="price">₹${i.price} × ${i.qty}</div>
        </div>
        <button class="remove" onclick="Cart.remove(${i.id})">Remove</button>
      </div>
    `).join('')}
    <div class="cart-total">Total: ₹${Cart.getTotal()}</div>
  `;
}

/* =========================================================
   MODULE 5: HELPERS
========================================================= */
function debounce(fn, delay) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

/* =========================================================
   ROUTER DRIVER: re-renders on every hash change
========================================================= */
function render() {
  const route = parseRoute();
  setActiveNav(route.name);
  if (route.name === 'home') viewHome();
  else if (route.name === 'product') viewProduct(route.id);
  else if (route.name === 'cart') viewCart();
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => {
  Cart.updateBadge();
  render();
});
</script>
</body>
</html>
