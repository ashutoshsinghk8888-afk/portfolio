<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="My Portfolio">
<title>Portfolio</title>
  <style>
:root{
  --bg:#ffffff;
  --text:#222222;
  --primary:#2563eb;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  margin:0;
}

header,footer{
  background:var(--primary);
  color:white;
  padding:20px;
  text-align:center;
}

main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

section{
  border:1px solid #ddd;
  padding:15px;
  border-radius:10px;
}

nav{
  display:flex;
  justify-content:center;
  gap:15px;
}

@media(max-width:768px){
  main{
    grid-template-columns:1fr;
  }
}
  </style>
</head>

<body>

<header>
<h1>My Portfolio</h1>
<nav aria-label="Main Navigation">
<a href="#about">About</a> |
<a href="#contact">Contact</a>
</nav>
</header>

<main>

<section id="about">
<h2>About Me</h2>
<p>I am a student learning web development.</p>
</section>

<section>
<h2>Skills</h2>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>
</section>

<section id="contact">
<h2>Contact</h2>
