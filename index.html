<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Weather Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .container {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  h1 {
    text-align: center;
    color: #1e3a8a;
    margin-bottom: 20px;
    font-size: 24px;
  }
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .search-box input {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
  }
  .search-box input:focus { border-color: #4facfe; }
  .search-box button {
    padding: 12px 18px;
    background: #1e3a8a;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }
  .search-box button:hover { background: #2563eb; }
  #status {
    text-align: center;
    margin: 15px 0;
    color: #555;
    font-size: 14px;
    min-height: 20px;
  }
  .error {
    color: #d32f2f !important;
    background: #ffebee;
    padding: 10px;
    border-radius: 8px;
  }
  #weatherCard {
    display: none;
    text-align: center;
  }
  #weatherCard .city {
    font-size: 22px;
    font-weight: bold;
    color: #1e3a8a;
  }
  #weatherCard .temp {
    font-size: 50px;
    font-weight: bold;
    color: #2563eb;
    margin: 10px 0;
  }
  #weatherCard .desc {
    font-size: 16px;
    color: #555;
    margin-bottom: 15px;
  }
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }
  .metric-box {
    background: #f0f7ff;
    border-radius: 12px;
    padding: 14px;
  }
  .metric-box .label {
    font-size: 12px;
    color: #888;
  }
  .metric-box .value {
    font-size: 18px;
    font-weight: bold;
    color: #1e3a8a;
    margin-top: 4px;
  }
  .loader {
    border: 4px solid #e0e0e0;
    border-top: 4px solid #2563eb;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 15px auto;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <h1>🌦️ Weather Dashboard</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name..." />
    <button id="searchBtn">Search</button>
  </div>

  <div class="loader" id="loader"></div>
  <div id="status"></div>

  <div id="weatherCard">
    <div class="city" id="cityName"></div>
    <div class="temp" id="temperature"></div>
    <div class="desc" id="description"></div>
    <div class="metrics">
      <div class="metric-box">
        <div class="label">Humidity</div>
        <div class="value" id="humidity"></div>
      </div>
      <div class="metric-box">
        <div class="label">Wind Speed</div>
        <div class="value" id="windSpeed"></div>
      </div>
      <div class="metric-box">
        <div class="label">Feels Like</div>
        <div class="value" id="feelsLike"></div>
      </div>
      <div class="metric-box">
        <div class="label">Pressure</div>
        <div class="value" id="pressure"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const cityInput = document.getElementById('cityInput');
  const searchBtn = document.getElementById('searchBtn');
  const statusEl = document.getElementById('status');
  const loaderEl = document.getElementById('loader');
  const weatherCard = document.getElementById('weatherCard');

  // Weather code -> description mapping (Open-Meteo WMO codes)
  const weatherDescriptions = {
    0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
    45: "Fog", 48: "Freezing fog",
    51: "Light drizzle", 53: "Moderate drizzle", 55: "Dense drizzle",
    61: "Light rain", 63: "Moderate rain", 65: "Heavy rain",
    71: "Light snow", 73: "Moderate snow", 75: "Heavy snow",
    80: "Rain showers", 81: "Moderate showers", 82: "Violent showers",
    95: "Thunderstorm", 96: "Thunderstorm with hail", 99: "Severe thunderstorm"
  };

  function showLoading(isLoading) {
    loaderEl.style.display = isLoading ? 'block' : 'none';
  }

  function showStatus(message, isError = false) {
    statusEl.textContent = message;
    statusEl.className = isError ? 'error' : '';
  }

  function clearStatus() {
    statusEl.textContent = '';
    statusEl.className = '';
  }

  // Step 1: Get latitude/longitude from city name (Geocoding API)
  async function getCoordinates(city) {
    const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`Geocoding request failed (status ${response.status})`);
    }

    const data = await response.json();

    if (!data.results || data.results.length === 0) {
      throw new Error(`City "${city}" not found. Please check spelling.`);
    }

    const place = data.results[0];
    return {
      lat: place.latitude,
      lon: place.longitude,
      name: place.name,
      country: place.country || ''
    };
  }

  // Step 2: Get weather data using coordinates
  async function getWeatherData(lat, lon) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,weather_code,pressure_msl&timezone=auto`;
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`Weather request failed (status ${response.status})`);
    }

    const data = await response.json();

    if (!data.current) {
      throw new Error('Unexpected response format from weather server.');
    }

    return data.current;
  }

  // Step 3: Render weather data on dashboard
  function renderWeather(locationInfo, current) {
    document.getElementById('cityName').textContent =
      `${locationInfo.name}${locationInfo.country ? ', ' + locationInfo.country : ''}`;

    document.getElementById('temperature').textContent =
      `${Math.round(current.temperature_2m)}°C`;

    const desc = weatherDescriptions[current.weather_code] || 'Unknown conditions';
    document.getElementById('description').textContent = desc;

    document.getElementById('humidity').textContent =
      `${current.relative_humidity_2m}%`;

    document.getElementById('windSpeed').textContent =
      `${current.wind_speed_10m} km/h`;

    document.getElementById('feelsLike').textContent =
      `${Math.round(current.apparent_temperature)}°C`;

    document.getElementById('pressure').textContent =
      `${Math.round(current.pressure_msl)} hPa`;

    weatherCard.style.display = 'block';
  }

  // Main async function tying everything together
  async function fetchWeatherForCity(city) {
    if (!city || city.trim() === '') {
      showStatus('Please enter a city name.', true);
      return;
    }

    weatherCard.style.display = 'none';
    clearStatus();
    showLoading(true);

    try {
      const location = await getCoordinates(city.trim());
      const current = await getWeatherData(location.lat, location.lon);
      renderWeather(location, current);
      clearStatus();
    } catch (error) {
      // Comprehensive error handling for failed network requests
      console.error('Weather fetch error:', error);
      if (error.message.includes('fetch') || error.name === 'TypeError') {
        showStatus('Network error. Please check your internet connection.', true);
      } else {
        showStatus(error.message, true);
      }
    } finally {
      showLoading(false);
    }
  }

  searchBtn.addEventListener('click', () => {
    fetchWeatherForCity(cityInput.value);
  });

  cityInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      fetchWeatherForCity(cityInput.value);
    }
  });

  // Load default city on page load
  window.addEventListener('DOMContentLoaded', () => {
    fetchWeatherForCity('Delhi');
  });
</script>

</body>
</html>
